name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Build-safe placeholders: the app must compile without live secrets.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: i18n parity
        run: npm run i18n:check

      - name: Test + coverage gate
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Start production server
        run: npm run start &
        env:
          PORT: "3000"

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 30); do
            if curl -sf -A "Mozilla/5.0" http://127.0.0.1:3000/api/health; then
              echo "Server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Server did not become ready"
          exit 1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: k6 load smoke (SLO gate)
        run: k6 run scripts/load-test/k6-smoke.js
        env:
          BASE_URL: http://127.0.0.1:3000
          K6_VUS: "5"
          K6_DURATION: "10s"

  audit:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high and above)
        run: npm audit --audit-level=high

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
